version: '3.8'
services:
  backend:
    build: ./fitness-backend
    ports:
      - "5000:5000"
    volumes:
      - ./fitness-backend/data:/usr/src/app/data
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - JWT_SECRET=change_this_secret

  frontend:
    build: ./fitness-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./fitness-frontend:/usr/src/app:delegated
      - frontend_node_modules:/usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
